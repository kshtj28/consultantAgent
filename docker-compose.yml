version: '3.8'

services:
  # OpenSearch - Vector Database
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: consultant-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - consultant-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consultant-backend
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENSEARCH_NODE=http://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=admin
      - JWT_SECRET=${JWT_SECRET:-default-jwt-secret-change-me}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consultant-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consultant-frontend
    ports:
      - "3005:8080"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consultant-network

volumes:
  opensearch-data:
    driver: local
  uploads-data:
    driver: local

networks:
  consultant-network:
    driver: bridge
